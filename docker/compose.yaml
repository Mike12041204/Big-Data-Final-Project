services:
  # 1
  mongo1:
    image: mongo:7.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"

  # 2
  mongo2:
    image: mongo:7.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

  # 3
  mongo3:
    image: mongo:7.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

# Configure replica set
  mongo-init:
    image: mongo:7.0
    depends_on:
      - mongo1
    entrypoint: >
      mongosh --host mongo1:27017 --eval 
      'rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongo1:27017"}, {_id: 1, host: "mongo2:27017"}, {_id: 2, host: "mongo3:27017"}]})'

  # Application service
  app:
    build: .
    depends_on:
      - mongo-init
    environment:
      - MONGODB_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0
    volumes:
      - ../project:/app/project
      - ../src:/app/src
      - ../taxi_trip_data.csv:/app/taxi_trip_data.csv